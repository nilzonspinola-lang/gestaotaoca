<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATAs — Taoca OS</title>
  <link rel="stylesheet" href="css/taoca-design-system.css" />
  <link rel="stylesheet" href="css/notifications.css" />
  <link rel="icon" href="assets/taoca-logo.png" />
  <style>
    .ata-grid {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 22px;
    }
    @media (max-width: 1024px) { .ata-grid { grid-template-columns: 1fr; } }

    .task-line {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 12px;
      background: var(--taoca-cream-50);
      border-radius: var(--radius-md);
      margin-bottom: 6px;
    }
    .task-line .num {
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--brand); color: #FFF;
      display: grid; place-items: center;
      font-weight: 700; font-size: 0.78rem;
      flex-shrink: 0;
    }
    .task-line .text { flex: 1; font-size: 0.92rem; }
    .task-line .remove { background: transparent; border: 0; cursor: pointer; color: var(--danger); font-size: 1.1rem; }

    .ata-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-xl);
      padding: 16px;
      margin-bottom: 12px;
    }
    .ata-card .ata-head { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
    .ata-card .ata-title { font-family: var(--font-serif); font-weight: 600; font-size: 1.05rem; }
    .ata-card .ata-meta { font-size: 0.8rem; color: var(--text-muted); }
  </style>
</head>
<body>

  <div class="ata-grid">
    <!-- Coluna esquerda: criar nova ATA -->
    <div>
      <div class="card card-pad mb-4">
        <div class="section-head" style="margin-bottom:6px;">
          <div class="title-block">
            <div class="eyebrow">Nova ATA</div>
            <h3 class="h-title" style="font-size:1.25rem;">Registrar reunião</h3>
            <p class="h-sub">Preencha o cabeçalho, adicione tarefas e gere os cards de uma só vez.</p>
          </div>
        </div>

        <div class="field">
          <label for="ata-title">Título da ATA *</label>
          <input type="text" id="ata-title" class="input" placeholder="Ex.: Reunião de produção — semana 18" maxlength="200" />
        </div>
        <div class="grid grid-2">
          <div class="field">
            <label for="ata-date">Data da reunião *</label>
            <input type="date" id="ata-date" class="input" />
          </div>
          <div class="field">
            <label for="ata-author">Autor / responsável *</label>
            <input type="text" id="ata-author" class="input" placeholder="Quem registra a ATA" />
          </div>
        </div>
        <div class="field">
          <label for="ata-participants">Participantes</label>
          <input type="text" id="ata-participants" class="input" placeholder="Separe os nomes por vírgula" />
        </div>
        <div class="field">
          <label for="ata-notes">Observações (opcional)</label>
          <textarea id="ata-notes" class="textarea" placeholder="Decisões tomadas, contexto, próximos passos…" maxlength="2000"></textarea>
        </div>

        <hr style="border:0; border-top:1px solid var(--border-soft); margin:16px 0;" />

        <div class="field">
          <label for="ata-tasks">Lista de tarefas (uma por linha) — IA remove numeração automática</label>
          <textarea id="ata-tasks" class="textarea" style="min-height:140px;" placeholder="1. Inocular novo lote de Shimeji
- Atualizar planilha de custos
• Visitar fornecedor de substrato"></textarea>
        </div>

        <div class="field">
          <label for="ata-default-category">Categoria padrão das tarefas</label>
          <select id="ata-default-category" class="select">
            <option value="producao">🍄 Produção</option>
            <option value="cultivo">🌱 Cultivo</option>
            <option value="operacional" selected>Operacional</option>
            <option value="institucional">Institucional</option>
            <option value="financeiro">Financeiro</option>
            <option value="comercial">Comercial</option>
            <option value="estrategico">Estratégico</option>
            <option value="marketing">Marketing</option>
            <option value="outras">Outras</option>
          </select>
        </div>

        <div class="text-sm text-secondary mb-3"><span id="ata-task-count">0</span> tarefa(s) na lista</div>

        <div class="flex gap-2" style="flex-wrap:wrap;">
          <button class="btn btn-primary" id="ata-save-btn" type="button">💾 Salvar ATA &amp; gerar tarefas</button>
          <button class="btn btn-ghost" id="ata-clear-btn" type="button">Limpar</button>
        </div>
      </div>
    </div>

    <!-- Coluna direita: histórico -->
    <div>
      <div class="section-head" style="margin-bottom:10px;">
        <div class="title-block">
          <div class="eyebrow">Histórico</div>
          <h3 class="h-title" style="font-size:1.25rem;">ATAs registradas</h3>
          <p class="h-sub">Acompanhe as últimas reuniões da equipe.</p>
        </div>
        <span class="sync-pill"><span class="sync-dot" id="sync-dot"></span><span id="sync-text">Sincronizado</span></span>
      </div>
      <div id="atas-list">
        <div class="loading-state">Carregando histórico…</div>
      </div>
    </div>
  </div>

  <script src="js/taoca-shell.js"></script>
  <script>TaocaShell.mount({ active: 'atas', breadcrumb: 'Operação · ATAs', title: 'Atas de Reunião' });</script>

  <script>
    (function () {
      const ATAS_TABLE='atas', TASKS_TABLE='tasks';
      const POLL_MS=12000;

      const $ = (id) => document.getElementById(id);
      const titleI=$('ata-title'), dateI=$('ata-date'), authorI=$('ata-author'), partsI=$('ata-participants'), notesI=$('ata-notes'), tasksI=$('ata-tasks'), catI=$('ata-default-category');
      const taskCountEl=$('ata-task-count'), saveBtn=$('ata-save-btn'), clearBtn=$('ata-clear-btn');
      const listEl=$('atas-list'), syncDot=$('sync-dot'), syncText=$('sync-text');

      function setSync(state, msg){
        syncDot.classList.remove('syncing','error');
        if(state==='syncing') syncDot.classList.add('syncing');
        if(state==='error') syncDot.classList.add('error');
        syncText.textContent = msg || (state==='syncing'?'Sincronizando…':state==='error'?'Falha':'Sincronizado');
      }
      function escapeHtml(s){return String(s==null?'':s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

      function parseLines(){
        const raw = (tasksI.value||'').split('\n').map(l=>l.trim()).filter(Boolean);
        return raw.map(l => l.replace(/^[\s]*([0-9]+[\.\)]\s*|[-•*]\s*)+/, '').trim()).filter(Boolean);
      }
      function updateCount(){ taskCountEl.textContent = parseLines().length; }
      tasksI.addEventListener('input', updateCount);

      // Defaults
      try {
        const today = new Date().toISOString().slice(0,10);
        dateI.value = today;
        const u = (window.TaocaShell && TaocaShell.getCurrentUser && TaocaShell.getCurrentUser()) || '';
        if(u) authorI.value = u;
      } catch(e){}

      async function fetchAtas(){
        try {
          const r = await fetch(`tables/${ATAS_TABLE}?limit=200&sort=meeting_date`);
          if(!r.ok) return [];
          const j = await r.json();
          return (j.data||[]).filter(x=>!x.deleted).sort((a,b)=>String(b.meeting_date||'').localeCompare(String(a.meeting_date||'')));
        } catch(e){ return []; }
      }
      async function nextTaskNumber(){
        try {
          const r = await fetch(`tables/${TASKS_TABLE}?limit=500`);
          if(!r.ok) return 1;
          const j = await r.json();
          const all=(j.data||[]).filter(x=>!x.deleted);
          if(!all.length) return 1;
          return Math.max(...all.map(t=>Number(t.task_number)||0))+1;
        } catch(e){ return 1; }
      }

      async function renderHistory(){
        setSync('syncing','Carregando histórico…');
        const atas = await fetchAtas();
        if(!atas.length){
          listEl.innerHTML = `<div class="empty-state"><div class="em-icon">📑</div><div class="em-title">Nenhuma ATA registrada</div><div>Crie a primeira ao lado.</div></div>`;
          setSync('ok','Sincronizado'); return;
        }
        listEl.innerHTML = atas.map(a => {
          const date = a.meeting_date ? a.meeting_date.split('-').reverse().join('/') : '—';
          const tasks = Array.isArray(a.tasks_titles) ? a.tasks_titles : (a.tasks_count?[]:[]);
          const count = a.tasks_count || (Array.isArray(tasks)?tasks.length:0);
          return `
            <div class="ata-card">
              <div class="ata-head">
                <div>
                  <div class="ata-title">${escapeHtml(a.title||'(sem título)')}</div>
                  <div class="ata-meta">${escapeHtml(date)} · ${escapeHtml(a.author||'Equipe')}${a.participants?` · Participantes: ${escapeHtml(a.participants)}`:''}</div>
                </div>
                <span class="tag tag-info">${count} tarefa(s)</span>
              </div>
              ${a.notes?`<div class="text-sm text-secondary" style="margin-top:6px">${escapeHtml(a.notes)}</div>`:''}
            </div>
          `;
        }).join('');
        setSync('ok','Sincronizado');
      }

      async function saveAta(){
        const title = (titleI.value||'').trim();
        const date  = (dateI.value||'').trim();
        const author= (authorI.value||'').trim();
        const parts = (partsI.value||'').trim();
        const notes = (notesI.value||'').trim();
        const cat   = catI.value;
        const lines = parseLines();
        if(!title) return alert('Título obrigatório.');
        if(!date)  return alert('Data obrigatória.');
        if(!author) return alert('Autor obrigatório.');

        saveBtn.disabled = true;
        setSync('syncing','Salvando ATA…');
        try {
          // 1. cria ATA
          const ataPayload = { title, meeting_date: date, author, participants: parts, notes, tasks_count: lines.length, tasks_titles: lines };
          const ataRes = await fetch(`tables/${ATAS_TABLE}`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(ataPayload) });
          if(!ataRes.ok) throw new Error('Falha ao salvar ATA');

          // 2. cria tarefas em sequência
          let n = await nextTaskNumber();
          for (const line of lines) {
            const tPayload = { task_number: n++, category: cat, title: line, description: `Originada da ATA: ${title} (${date})`, status:'pendente', completed_by:'', completed_at:'', completed_at_iso:'', due_date:'', created_by: author };
            await fetch(`tables/${TASKS_TABLE}`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(tPayload) });
          }

          if(window.TaocaNotif){
            window.TaocaNotif.log({ event_type:'ata_created', icon:'📑', actor:author, title:`${author} criou ATA: ${title}`, details:`${lines.length} tarefa(s) gerada(s)`, task_id:'', task_number:0 });
          }
          alert(`ATA salva e ${lines.length} tarefa(s) criada(s)! 🍄`);
          // limpa
          titleI.value=''; partsI.value=''; notesI.value=''; tasksI.value=''; updateCount();
          renderHistory();
          setSync('ok','Sincronizado');
        } catch(err){ console.error(err); setSync('error','Falha'); alert('Erro ao salvar ATA. Tente novamente.'); }
        finally { saveBtn.disabled = false; }
      }

      saveBtn.addEventListener('click', saveAta);
      clearBtn.addEventListener('click', () => {
        if(!confirm('Limpar formulário?')) return;
        titleI.value=''; partsI.value=''; notesI.value=''; tasksI.value=''; updateCount();
      });

      renderHistory();
      setInterval(renderHistory, POLL_MS);
    })();
  </script>

  <script src="js/notifications.js"></script>
  <script src="js/taoca-ai.js"></script>
</body>
</html>
