<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Taoca OS</title>
  <link rel="stylesheet" href="css/taoca-design-system.css" />
  <link rel="icon" href="assets/taoca-logo.png" />
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--taoca-cream-50) 0%, #FFF 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .auth-wrapper {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 2;
    }

    .auth-brand {
      text-align: center;
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .auth-brand img {
      width: 160px;
      max-width: 60%;
      height: auto;
      object-fit: contain;
      display: block;
    }

    .auth-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-2xl);
      padding: 32px 30px 28px;
      box-shadow: var(--shadow-lg);
    }
    .auth-card h2 {
      font-family: var(--font-serif);
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--brand-strong);
      margin-bottom: 6px;
    }
    .auth-card .desc {
      color: var(--text-secondary);
      margin-bottom: 22px;
      font-size: 0.9rem;
    }

    .field-input-wrap { position: relative; }
    .toggle-pwd {
      position: absolute;
      right: 10px; top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: 0;
      cursor: pointer;
      color: var(--text-muted);
      padding: 6px;
      display: grid;
      place-items: center;
      border-radius: 6px;
      transition: color var(--t-fast), background var(--t-fast);
    }
    .toggle-pwd:hover { color: var(--brand); background: var(--bg-soft); }
    .toggle-pwd svg { display: block; }

    .err-box {
      display: none;
      background: var(--danger-bg);
      border: 1px solid #FCA5A5;
      color: var(--danger);
      padding: 10px 14px;
      border-radius: var(--radius-md);
      font-weight: 500;
      font-size: 0.88rem;
      margin-bottom: 16px;
    }
    .err-box.visible { display: block; }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background: var(--taoca-green-800);
      color: #FFF;
      border: 0;
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.01em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background var(--t-fast), transform var(--t-fast);
    }
    .submit-btn:hover:not(:disabled) {
      background: var(--taoca-green-900);
    }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #FFF;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .submit-btn.loading .spinner { display: block; }
    .submit-btn.loading .btn-text { opacity: 0.75; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-note {
      margin-top: 22px;
      text-align: center;
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    .footer-note strong { color: var(--brand); }
  </style>
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-brand">
      <img src="assets/taoca-logo.png" alt="Taoca — Natureza, qualidade e afeto" />
    </div>

    <div class="auth-card">
      <h2>Bem-vindo de volta</h2>
      <p class="desc">Acesse o sistema de gestão da Taoca.</p>

      <div class="err-box" id="err-box" role="alert">
        <span id="err-text">Usuário ou senha incorretos.</span>
      </div>

      <form id="login-form" autocomplete="on" novalidate>
        <div class="field">
          <label for="username">Usuário</label>
          <input
            type="text"
            id="username"
            name="username"
            class="input"
            placeholder="Seu usuário"
            autocomplete="username"
            spellcheck="false"
            required
          />
        </div>

        <div class="field">
          <label for="password">Senha</label>
          <div class="field-input-wrap">
            <input
              type="password"
              id="password"
              name="password"
              class="input"
              placeholder="Sua senha"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-pwd" id="toggle-pwd" aria-label="Mostrar/ocultar senha">
              <svg id="pwd-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="submit-btn" id="btn-login">
          <div class="spinner" id="spinner"></div>
          <span class="btn-text">Entrar</span>
        </button>
      </form>
    </div>

    <p class="footer-note">
      <strong>Taoca</strong> · Cultivo de cogumelos com gestão inteligente
    </p>
  </div>

  <script src="js/taoca-data.js?v=0.7.0"></script>
  <script>
    (function () {
      const SESSION_KEY = 'taoca-auth-ok';
      const USER_KEY = 'taoca-user';
      const USER_ID_KEY = 'taoca-user-id';
      const USER_ROLE_KEY = 'taoca-user-role';

      try {
        if (sessionStorage.getItem(SESSION_KEY) === '1') {
          window.location.replace('index.html');
          return;
        }
      } catch (e) {}

      const form = document.getElementById('login-form');
      const userInput = document.getElementById('username');
      const passInput = document.getElementById('password');
      const btn = document.getElementById('btn-login');
      const errBox = document.getElementById('err-box');
      const errText = document.getElementById('err-text');
      const togglePwd = document.getElementById('toggle-pwd');

      const EYE_OPEN = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
      const EYE_OFF = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
      togglePwd.addEventListener('click', () => {
        const isPwd = passInput.type === 'password';
        passInput.type = isPwd ? 'text' : 'password';
        togglePwd.innerHTML = isPwd ? EYE_OFF : EYE_OPEN;
      });

      [userInput, passInput].forEach(i => i.addEventListener('input', () => errBox.classList.remove('visible')));

      function showError(msg) {
        errText.textContent = msg || 'Usuário ou senha incorretos.';
        errBox.classList.add('visible');
      }
      function setLoading(on) {
        btn.disabled = on;
        btn.classList.toggle('loading', on);
      }

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const user = userInput.value.trim().toLowerCase();
        const pass = passInput.value;
        if (!user || !pass) return showError('Preencha usuário e senha.');

        setLoading(true);
        setTimeout(() => {
          if (!window.TaocaData || typeof TaocaData.authenticate !== 'function') {
            setLoading(false);
            return showError('Sistema indisponível. Recarregue a página.');
          }
          const result = TaocaData.authenticate(user, pass);
          if (result.ok) {
            try {
              sessionStorage.setItem(SESSION_KEY, '1');
              sessionStorage.setItem(USER_KEY, result.user.name);
              sessionStorage.setItem(USER_ID_KEY, result.user.id);
              sessionStorage.setItem(USER_ROLE_KEY, result.user.role);
            } catch (err) {}
            window.location.replace('index.html');
          } else {
            setLoading(false);
            if (result.error === 'inactive') {
              showError('Usuário desativado. Fale com um administrador.');
            } else {
              showError('Usuário ou senha incorretos.');
            }
            passInput.value = '';
            passInput.focus();
          }
        }, 400);
      });

      userInput.focus();
    })();
  </script>
</body>
</html>
