<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Taoca OS</title>
  <link rel="stylesheet" href="css/taoca-design-system.css" />
  <link rel="icon" href="assets/taoca-logo.png" />
  <style>
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 20%, rgba(74,120,86,0.18) 0%, transparent 45%),
        radial-gradient(circle at 85% 80%, rgba(199,123,92,0.14) 0%, transparent 45%),
        linear-gradient(135deg, var(--taoca-cream-50) 0%, #FFF 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    /* Folhas decorativas (SVG inline) */
    body::before, body::after {
      content: '';
      position: fixed;
      width: 320px; height: 320px;
      background-size: contain;
      background-repeat: no-repeat;
      opacity: 0.08;
      pointer-events: none;
    }
    body::before {
      top: -50px; left: -60px;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><path d='M100 20 C 60 60, 30 120, 100 180 C 170 120, 140 60, 100 20 Z' fill='%232F5D3A'/></svg>");
      transform: rotate(-30deg);
    }
    body::after {
      bottom: -50px; right: -60px;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><circle cx='100' cy='110' r='40' fill='%232F5D3A'/><rect x='90' y='110' width='20' height='70' fill='%232F5D3A'/></svg>");
    }

    .auth-wrapper {
      width: 100%;
      max-width: 460px;
      position: relative;
      z-index: 2;
    }

    .auth-brand {
      text-align: center;
      margin-bottom: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .auth-brand .tag {
      display: inline-block;
      font-family: var(--font-sans);
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
      padding: 5px 12px;
      background: var(--taoca-clay-100);
      border-radius: 999px;
    }
    .auth-brand img {
      width: 180px;
      max-width: 70%;
      height: auto;
      object-fit: contain;
      display: block;
    }

    .auth-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-2xl);
      padding: 32px 30px 26px;
      box-shadow: var(--shadow-lg);
    }
    .auth-card h2 {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--brand-strong);
      margin-bottom: 4px;
    }
    .auth-card .desc {
      color: var(--text-secondary);
      margin-bottom: 22px;
      font-size: 0.92rem;
    }

    .field-input-wrap { position: relative; }
    .field-icon {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      opacity: 0.55;
      pointer-events: none;
    }
    .field input {
      padding-left: 42px !important;
    }
    .toggle-pwd {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: 0;
      cursor: pointer;
      opacity: 0.55;
      font-size: 1rem;
      padding: 4px;
    }
    .toggle-pwd:hover { opacity: 0.9; }

    .err-box {
      display: none;
      align-items: center;
      gap: 8px;
      background: var(--danger-bg);
      border: 1px solid #FCA5A5;
      color: var(--danger);
      padding: 10px 14px;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: 0.88rem;
      margin-bottom: 16px;
    }
    .err-box.visible { display: flex; }

    .submit-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--taoca-green-800), var(--taoca-green-700));
      color: #FFF;
      border: 0;
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.02em;
      box-shadow: 0 10px 24px rgba(47,93,58,0.28);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: transform var(--t-fast), filter var(--t-fast), box-shadow var(--t-fast);
    }
    .submit-btn:hover:not(:disabled) {
      filter: brightness(1.05);
      transform: translateY(-1px);
    }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #FFF;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .submit-btn.loading .spinner { display: block; }
    .submit-btn.loading .btn-text { opacity: 0.75; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-note {
      margin-top: 22px;
      text-align: center;
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    .footer-note strong { color: var(--brand); }
  </style>
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-brand">
      <img src="assets/taoca-logo.png" alt="Taoca — Natureza, qualidade e afeto" />
    </div>

    <div class="auth-card">
      <h2>Bem-vindo de volta 🌿</h2>
      <p class="desc">Entre com suas credenciais para acessar o sistema de gestão.</p>

      <div class="err-box" id="err-box" role="alert">
        <span>⚠️</span>
        <span id="err-text">Usuário ou senha incorretos.</span>
      </div>

      <form id="login-form" autocomplete="on" novalidate>
        <div class="field">
          <label for="username">Usuário</label>
          <div class="field-input-wrap">
            <span class="field-icon">👤</span>
            <input
              type="text"
              id="username"
              name="username"
              class="input"
              placeholder="Seu usuário"
              autocomplete="username"
              spellcheck="false"
              required
            />
          </div>
        </div>

        <div class="field">
          <label for="password">Senha</label>
          <div class="field-input-wrap">
            <span class="field-icon">🔒</span>
            <input
              type="password"
              id="password"
              name="password"
              class="input"
              placeholder="Sua senha"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-pwd" id="toggle-pwd" aria-label="Mostrar/ocultar senha">👁️</button>
          </div>
        </div>

        <button type="submit" class="submit-btn" id="btn-login">
          <div class="spinner" id="spinner"></div>
          <span class="btn-text">Entrar</span>
        </button>
      </form>
    </div>

    <p class="footer-note">
      <strong>Taoca</strong> · Cultivo de cogumelos com gestão inteligente
    </p>
  </div>

  <script src="js/taoca-data.js"></script>
  <script>
    (function () {
      const SESSION_KEY = 'taoca-auth-ok';
      const USER_KEY = 'taoca-user';
      const USER_ID_KEY = 'taoca-user-id';
      const USER_ROLE_KEY = 'taoca-user-role';

      try {
        if (sessionStorage.getItem(SESSION_KEY) === '1') {
          window.location.replace('index.html');
          return;
        }
      } catch (e) {}

      const form = document.getElementById('login-form');
      const userInput = document.getElementById('username');
      const passInput = document.getElementById('password');
      const btn = document.getElementById('btn-login');
      const errBox = document.getElementById('err-box');
      const errText = document.getElementById('err-text');
      const togglePwd = document.getElementById('toggle-pwd');

      togglePwd.addEventListener('click', () => {
        const isPwd = passInput.type === 'password';
        passInput.type = isPwd ? 'text' : 'password';
        togglePwd.textContent = isPwd ? '🙈' : '👁️';
      });

      [userInput, passInput].forEach(i => i.addEventListener('input', () => errBox.classList.remove('visible')));

      function showError(msg) {
        errText.textContent = msg || 'Usuário ou senha incorretos.';
        errBox.classList.add('visible');
      }
      function setLoading(on) {
        btn.disabled = on;
        btn.classList.toggle('loading', on);
      }

      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const user = userInput.value.trim().toLowerCase();
        const pass = passInput.value;
        if (!user || !pass) return showError('Preencha usuário e senha.');

        setLoading(true);
        setTimeout(() => {
          if (!window.TaocaData || typeof TaocaData.authenticate !== 'function') {
            setLoading(false);
            return showError('Sistema indisponível. Recarregue a página.');
          }
          const result = TaocaData.authenticate(user, pass);
          if (result.ok) {
            try {
              sessionStorage.setItem(SESSION_KEY, '1');
              sessionStorage.setItem(USER_KEY, result.user.name);
              sessionStorage.setItem(USER_ID_KEY, result.user.id);
              sessionStorage.setItem(USER_ROLE_KEY, result.user.role);
            } catch (err) {}
            window.location.replace('index.html');
          } else {
            setLoading(false);
            if (result.error === 'inactive') {
              showError('Usuário desativado. Fale com um administrador.');
            } else {
              showError('Usuário ou senha incorretos.');
            }
            passInput.value = '';
            passInput.focus();
          }
        }, 400);
      });

      userInput.focus();
    })();
  </script>
</body>
</html>
